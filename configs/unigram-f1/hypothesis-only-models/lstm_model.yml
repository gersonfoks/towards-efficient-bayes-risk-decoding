
dataset:
  dir: 'predictive/tatoeba-de-en/data/raw/'
  sampling_method: 'ancestral'
  n_hypotheses: 10
  n_references: 100
  repeated_indices: False
  utility: unigram-f1
batch_size: 64
accumulate_grad_batches: 2 # Effective batch size of 128




save_model_path: 'predictive/tatoeba-de-en/models/unigram-f1/hypothesis_lstm_model/'


log_dir: './logs/lstm_model'

model:
  type: hypothesis_lstm_model
  lr: 0.0005 #1.4815897489348615e-05
  weight_decay: 1.0e-06
  loss_function: 'MSE'
  preprocess_type: 'full'
  dropout: 0.25 #0.6712665889822903
  nmt_model:
    model:
      name: 'Helsinki-NLP/opus-mt-de-en'
      checkpoint: 'NMT/tatoeba-de-en/model'
      type: 'MarianMT'

  feed_forward_layers:
    dims:
      - 512
      - 256
      - 128
      - 1
    activation_function: 'relu'
    activation_function_last_layer: 'sigmoid'
  embedding:
    type: learned_embedding
    size: 512
  optimizer:
    type: adam_with_steps
    step_size: 1
    gamma: 0.9

max_epochs: 30




