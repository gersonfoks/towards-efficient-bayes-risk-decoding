
# Information about the dataset
dataset:
  dir: 'predictive/tatoeba-de-en/data/raw/'
  preproces_dir: 'predictive/tatoeba-de-en/data/preprocessed/'
  sampling_method: 'ancestral'
  n_hypotheses: 100
  n_references: 1000
  repeated_indices: False

#
model_name: last_hidden_state_lstm

# Describes how to preprocess, can use predefined preprocessing functions
preprocess:
  name: basic

collator:
  name: nmt_collator

# Training
batch_size: 64
accumulate_grad_batches: 2 # Effective batch size of 128

max_epochs: 150


# Model information
model:
  type: last_hidden_state_model
  nmt_model:
      name: 'Helsinki-NLP/opus-mt-de-en'
      checkpoint: 'NMT/tatoeba-de-en/model'
      type: 'MarianMT'

  lr: 4.0e-4 #1.4815897489348615e-05
  weight_decay: 3.0e-9 #5.0e-07
  dropout: 0.41 #0.5 #0.6712665889822903
  pooling:
    name: attention
    embedding_size: 512
    n_heads: 8
  feed_forward_layers:
    dims:
      - 512
      - 256
      - 1
    activation_function: 'relu'
  grad_clip_val: 3.2

  optimizer:
    type: adam_with_lr_decay
    step_size: 1
    gamma: 0.86
    interval: epoch



