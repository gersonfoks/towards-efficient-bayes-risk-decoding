
# Information about the dataset
dataset:
  dir: 'predictive/tatoeba-de-en/data/raw/'
  preproces_dir: 'predictive/tatoeba-de-en/data/preprocessed/'
  sampling_method: 'ancestral'
  n_hypotheses: 100
  n_references: 1000
  repeated_indices: False

#
model_name: last_hidden_state_attention

# Describes how to preprocess, can use predefined preprocessing functions
preprocess:
  name: basic

collator:
  name: nmt_collator

# Training
batch_size: 64
accumulate_grad_batches: 8 # Effective batch size of 128
gradient_clip_val: 2.7
max_epochs: 150


# Model information
model:
  type: last_hidden_state_model
  nmt_model:
      name: 'Helsinki-NLP/opus-mt-de-en'
      checkpoint: 'NMT/tatoeba-de-en/model'
      type: 'MarianMT'

  lr: 4.0e-4 #1.4815897489348615e-05
  weight_decay: 7.2e-08 #5.0e-07
  dropout: 0.56 #0.5 #0.6712665889822903
  pooling:
    name: attention
    embedding_size: 512
    n_heads: 8
    n_queries: 2
  feed_forward_layers:
    dims:
      - 1024
      - 256
      - 1
    activation_function: 'relu'
    activation_function_last_layer: 'tanh'
    last_layer_scale: 2.5
  grad_clip_val: 3.2

  optimizer:
    type: adam_with_lr_decay
    step_size: 1
    gamma: 0.73
    interval: epoch



