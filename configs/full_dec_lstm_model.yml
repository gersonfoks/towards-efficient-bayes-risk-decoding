
# Information about the dataset
dataset:
  dir: 'predictive/tatoeba-de-en/data/raw/'
  preproces_dir: 'predictive/tatoeba-de-en/data/preprocessed/'
  sampling_method: 'ancestral'
  n_hypotheses: 100
  n_references: 1000
  repeated_indices: False
table_location: 'predictive/tatoeba-de-en/data/lookup_tables/'

#
model_name: full_dec_lstm_model

# Describes how to preprocess, can use predefined preprocessing functions
preprocess:
  name: refs_with_prob_entropy

collator:
  name: full_dec_collator

# Training
batch_size: 64
accumulate_grad_batches: 4 # Effective batch size of 128

max_epochs: 150


# Model information
model:
  type: full_dec_model
  nmt_model:
      name: 'Helsinki-NLP/opus-mt-de-en'
      checkpoint: 'NMT/tatoeba-de-en/model'
      type: 'MarianMT'

  lr: 1.0e-4 #1.4815897489348615e-05
  weight_decay: 5.0e-7 #5.0e-07
  dropout: 0.4 #0.5 #0.6712665889822903

  dec_pooling:
    name: lstm
    embedding_size: 512
    hidden_state_size: 512

  n_statistics: 7
  embedding_size: 256
  token_pooling:
    name: lstm
    embedding_size: 256
    hidden_state_size: 512
  feed_forward_layers:
    dims:
      - 4096 # 8 * 512
      - 256
      - 128
      - 1
    activation_function: 'relu'
  batch_norm: False


  optimizer:
    type: adam_with_lr_decay
    step_size: 1
    gamma: 0.9
    interval: epoch

